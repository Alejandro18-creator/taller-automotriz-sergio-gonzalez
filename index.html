    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <div class="logo-area">
                <img src="img/logo.jpg" alt="Logo Taller">
            </div>

            <nav>
                <ul>
                    <li><i class="fas fa-chart-line"></i> Dashboard</li>
                    <li><i class="fas fa-users"></i> Clientes</li>
                    <li><i class="fas fa-car"></i> Vehículos</li>
                    <li><i class="fas fa-file-invoice"></i> Órdenes</li>
                    <li><i class="fas fa-chart-bar"></i> Reportes</li>
                    <li id="menuReserva"><i class="fas fa-calendar-check"></i> Reservar Hora</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="brand-name">Taller Automotriz</h1>
                    <span class="owner-name">Sergio González</span>
                </div>

                <div class="topbar-right">
                    <span class="user-info">
                        <i class="fas fa-user"></i> Sergio González
                    </span>
                </div>
            </header>

            <section class="content">

<div id="pantallaInicio">
<p>Bienvenido al sistema del taller.</p>
</div>

<div id="pantallaReserva" style="display:none;">

<h2>Reservar Hora</h2>

<form>

<label>Nombre</label>
<input type="text" placeholder="Nombre completo">

<label>Teléfono</label>
<input type="text" placeholder="Teléfono">

<label>Marca del vehículo</label>
<select id="marca">
<option value="">Seleccione una marca</option>
</select>

<label>Modelo</label>
<select id="modelo">
<option value="">Seleccione modelo</option>
</select>

<label>Patente</label>
<input type="text" placeholder="Patente">

<label>Fecha</label>
<input type="date">

<button type="submit">Solicitar Hora</button>

</form>

</div>

</section>
        </main>

    </div>
