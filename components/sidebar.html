<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar Taller</title>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo-area">
        <img src="img/logo.jpg" alt="Logo Taller" />
        <!-- WhatsApp Contacto -->
        <a
          href="https://wa.me/56975520550?text=Consulte%20ac%C3%A1"
          target="_blank"
          class="whatsapp-link"
        >
          <i class="fab fa-whatsapp"></i>
        </a>
      </div>

      <nav>
        <ul>
          <li data-module="dashboard">
            <i class="fas fa-chart-line"></i> Dashboard
          </li>
          <li data-module="clientes"><i class="fas fa-users"></i> Clientes</li>
          <li data-module="vehiculos"><i class="fas fa-car"></i> Vehículos</li>
          <li class="submenu-parent">
            <div class="submenu-toggle">
              <i class="fas fa-file-invoice"></i> Órdenes
              <i class="fas fa-caret-down"></i>
            </div>
            <ul class="submenu">
              <li data-module="ordenes">
                <i class="fas fa-list"></i> Listado de Órdenes
              </li>
              <li data-module="diagnostico">
                <i class="fas fa-stethoscope"></i> Recepción y Diagnóstico
              </li>
            </ul>
          </li>
          <li data-module="reportes">
            <i class="fas fa-chart-bar"></i> Reportes
          </li>
          <li data-module="reservas">
            <i class="fas fa-calendar-check"></i> Reservar Hora
          </li>
        </ul>
      </nav>
      <script>
        // Submenú interactivo profesional
        document.addEventListener("DOMContentLoaded", function () {
          const submenuParent = document.querySelector(".submenu-parent");
          const submenuToggle = submenuParent.querySelector(".submenu-toggle");
          submenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            submenuParent.classList.toggle("open");
          });
          // Cerrar submenú al hacer clic fuera
          document.addEventListener("click", function (e) {
            if (!submenuParent.contains(e.target)) {
              submenuParent.classList.remove("open");
            }
          });
          // Abrir automáticamente al cargar
          submenuParent.classList.add("open");
        });
      </script>
    </aside>
  </body>
</html>
